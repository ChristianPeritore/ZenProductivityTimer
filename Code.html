<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Pomodoro Timer</title>
    
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --accent-color: #63b3ed;
            --break-color: #48bb78;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            width: 320px;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #timer {
            font-size: 5rem;
            font-weight: bold;
            margin: 20px 0;
            color: var(--accent-color);
            transition: color 0.5s ease;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        button:active {
            transform: translateY(0);
        }

        #reset {
            background-color: #cbd5e0;
            color: #4a5568;
        }

        .status-msg {
            margin-top: 25px;
            font-style: italic;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="title">Focus</h1>
        <div id="timer">25:00</div>
        
        <div class="buttons">
            <button id="start">Avvia</button>
            <button id="reset">Reset</button>
        </div>

        <p class="status-msg" id="message">Fai un respiro profondo.</p>
    </div>

    <script>
        let timeLeft = 25 * 60; // 25 minuti in secondi
        let timerId = null;
        let isRunning = false;

        const timerDisplay = document.getElementById('timer');
        const startBtn = document.getElementById('start');
        const resetBtn = document.getElementById('reset');
        const titleLabel = document.getElementById('title');
        const messageLabel = document.getElementById('message');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function startTimer() {
            if (isRunning) {
                clearInterval(timerId);
                startBtn.textContent = 'Riprendi';
                isRunning = false;
            } else {
                isRunning = true;
                startBtn.textContent = 'Pausa';
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();

                    if (timeLeft <= 0) {
                        clearInterval(timerId);
                        alert("Tempo scaduto! È ora di una pausa.");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(timerId);
            timeLeft = 25 * 60;
            isRunning = false;
            startBtn.textContent = 'Avvia';
            updateDisplay();
        }

        startBtn.addEventListener('click', startTimer);
        resetBtn.addEventListener('click', resetTimer);

        // Inizializza il display
        updateDisplay();
    </script>
</body>
</html>
