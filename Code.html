<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Focus - Pro Timer</title>
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent-glow: #38bdf8;
            --warning-glow: #fbbf24;
            --error-color: #ef4444;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 { font-size: 1rem; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 4px; opacity: 0.6; }

        .settings {
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        input[type="number"] {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px;
            border-radius: 8px;
            width: 80px;
            text-align: center;
            font-size: 1.1rem;
            outline: none;
        }

        input[type="number"]:focus { border-color: var(--accent-glow); }

        .limit-hint { 
            font-size: 0.7rem; 
            opacity: 0.4; 
            margin-bottom: 2rem; 
            display: block; 
            line-height: 1.5;
        }

        #timer {
            font-size: 4.5rem;
            font-weight: 800;
            margin: 1rem 0;
            color: var(--accent-glow);
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            transition: color 0.5s ease;
            font-variant-numeric: tabular-nums;
        }

        .pulse { animation: pulse-glow 1s infinite; }
        @keyframes pulse-glow {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); opacity: 0.9; }
            100% { transform: scale(1); }
        }

        .controls { display: flex; justify-content: center; gap: 12px; margin-top: 1.5rem; }
        
        button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 28px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent-glow);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            border-color: var(--accent-glow);
        }

        #set-time { 
            background: rgba(56, 189, 248, 0.1); 
            border-color: rgba(56, 189, 248, 0.4); 
            color: var(--accent-glow); 
        }

        #reset:hover { background: var(--error-color); border-color: var(--error-color); color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>Focus Session</h1>

    <div class="settings">
        <input type="number" id="minutes-input" value="25" min="1" max="1440">
        <span>MINS</span>
        <button id="set-time">SET</button>
    </div>
    
    <div class="limit-hint">
        Enter minutes (e.g., 90 for 1h 30m)<br>
        <strong>Min: 1 | Max: 1440 mins</strong>
    </div>

    <div id="timer">25m 00s</div>
    
    <div class="controls">
        <button id="start">START</button>
        <button id="reset">RESET</button>
    </div>
</div>

<script>
    let timeLeft = 25 * 60;
    let timerId = null;
    let isRunning = false;

    const timerDisplay = document.getElementById('timer');
    const startBtn = document.getElementById('start');
    const minutesInput = document.getElementById('minutes-input');
    const setBtn = document.getElementById('set-time');

    function updateDisplay() {
        const hours = Math.floor(timeLeft / 3600);
        const minutes = Math.floor((timeLeft % 3600) / 60);
        const seconds = timeLeft % 60;

        let displayString = "";
        if (hours > 0) { displayString += `${hours}h `; }
        displayString += `${minutes}m `;
        displayString += `${seconds < 10 ? '0' : ''}${seconds}s`;

        timerDisplay.textContent = displayString;
        
        if (timeLeft <= 60 && timeLeft > 0) {
            timerDisplay.style.color = "var(--warning-glow)";
        } else {
            timerDisplay.style.color = "var(--accent-glow)";
        }

        if (timeLeft <= 10 && timeLeft > 0) {
            timerDisplay.classList.add('pulse');
        } else {
            timerDisplay.classList.remove('pulse');
        }
    }

    setBtn.addEventListener('click', () => {
        clearInterval(timerId);
        isRunning = false;
        startBtn.textContent = 'START';
        
        let val = parseInt(minutesInput.value);
        if (isNaN(val) || val < 1) {
            val = 1;
            minutesInput.value = 1;
        } else if (val > 1440) {
            val = 1440;
            minutesInput.value = 1440;
        }

        timeLeft = val * 60;
        updateDisplay();
    });

    startBtn.addEventListener('click', () => {
        if (isRunning) {
            clearInterval(timerId);
            startBtn.textContent = 'RESUME';
            isRunning = false;
        } else {
            isRunning = true;
            startBtn.textContent = 'PAUSE';
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("Focus session complete!");
                    resetTimer();
                }
            }, 1000);
        }
    });

    document.getElementById('reset').addEventListener('click', resetTimer);

    function resetTimer() {
        clearInterval(timerId);
        let val = parseInt(minutesInput.value) || 25;
        timeLeft = val * 60;
        isRunning = false;
        startBtn.textContent = 'START';
        updateDisplay();
    }

    updateDisplay();
</script>
</body>
</html>
